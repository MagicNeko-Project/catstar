---
- name: Check if real certificate exists on localhost
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ ssl_cert_src | expanduser }}/{{ ssl_cert_name }}/fullchain.cer"
  register: ssl_local_cert_stat
  become: false

- name: Create ssl directory for domain
  ansible.builtin.file:
    path: "{{ ssl_root }}/{{ ssl_cert_name }}"
    state: directory
    mode: "0700"
  when: ssl_local_cert_stat.stat.exists

- name: Copy real certificates to host
  ansible.builtin.copy:
    src: "{{ ssl_cert_src | expanduser }}/{{ item.src }}"
    dest: "{{ ssl_root }}/{{ ssl_cert_name }}/{{ item.dest }}"
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ ssl_cert_name }}/fullchain.cer"
      dest: full.pem
      mode: "0644"
    - src: "{{ ssl_cert_name }}/{{ ssl_cert_name }}.key"
      dest: key.pem
      mode: "0600"
  when: ssl_local_cert_stat.stat.exists
  register: ssl_real_cert_copy
  notify: ssl cert updated
