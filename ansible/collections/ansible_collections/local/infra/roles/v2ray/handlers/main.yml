---
# handlers file for basic
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Start v2ray
  ansible.builtin.service:
    name: v2ray
    state: started
    enabled: true

- name: Restart v2ray
  ansible.builtin.service:
    name: v2ray
    state: restarted

- name: Restart v2ray on SSL update
  ansible.builtin.service:
    name: v2ray
    state: restarted
  listen: ssl cert updated
  when: v2ray_ssl_enabled | default(false)
