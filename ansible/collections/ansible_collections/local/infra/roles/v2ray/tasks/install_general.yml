---
- name: Install unzip
  ansible.builtin.apt:
    name: unzip

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "/usr/local/opt/v2ray-{{ v2ray_version }}"
    - "{{ v2ray_install }}"
    - "{{ v2ray_install }}/bin"
    - "{{ v2ray_install }}/etc/v2ray"

- name: Download V2Ray archive
  ansible.builtin.get_url:
    url: "{{ v2ray_url }}"
    dest: "/usr/local/opt/v2ray-{{ v2ray_version }}.zip"
    checksum: "{{ v2ray_checksum[ansible_facts.architecture] }}"
    mode: "0644"

- name: Extract V2Ray archive
  ansible.builtin.unarchive:
    src: "/usr/local/opt/v2ray-{{ v2ray_version }}.zip"
    dest: "/usr/local/opt/v2ray-{{ v2ray_version }}"
    remote_src: true
    creates: "/usr/local/opt/v2ray-{{ v2ray_version }}/v2ray"
  notify:
    - Restart v2ray

# TODO: Remove legacy directory migration tasks once all hosts are migrated.
- name: Check if legacy v2ray directory exists
  ansible.builtin.stat:
    path: "/usr/local/opt/v2ray"
  register: v2ray_legacy_dir_stat

- name: Remove legacy v2ray directory if it is a physical directory
  ansible.builtin.file:
    path: "/usr/local/opt/v2ray"
    state: absent
  when:
    - v2ray_legacy_dir_stat.stat.exists
    - not v2ray_legacy_dir_stat.stat.islnk

- name: Create symlink to current version
  ansible.builtin.file:
    src: "/usr/local/opt/v2ray-{{ v2ray_version }}"
    dest: "/usr/local/opt/v2ray"
    state: link
  notify:
    - Restart v2ray

- name: Link binary to system path
  ansible.builtin.file:
    src: "/usr/local/opt/v2ray/v2ray"
    dest: "{{ v2ray_install }}/bin/v2ray"
    state: link

- name: Copy service file
  ansible.builtin.template:
    src: v2ray.service
    dest: /etc/systemd/system/
    mode: "0644"
  notify:
    - Reload systemd
    - Start v2ray
