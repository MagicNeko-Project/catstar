---
# Installation options

# curl -s https://api.github.com/repos/v2fly/v2ray-core/releases/latest | jq -r '.tag_name'
v2ray_version: v5.49.0
v2ray_prefix: /usr/local/opt/v2ray
v2ray_install: /usr/local

# Mapping of ansible architecture to v2ray file name
v2ray_arch:
  x86_64: linux-64
  aarch64: arm64-v8a

v2ray_checksum:
  x86_64: "sha256:6c27d3f12c89a51b2efcf465ec37395ca7e51eaa7a9a58b8e3f43253df3143dd"
  aarch64: "sha256:0fd40348a2994cd3d33e3ca7cb227221c2b42c195638ba2e43d921fb623be1fb"

v2ray_file: "v2ray-{{ v2ray_arch[ansible_facts.architecture] }}.zip"
v2ray_url: "https://github.com/v2fly/v2ray-core/releases/download/{{ v2ray_version }}/{{ v2ray_file }}"
v2ray_archive: "{{ v2ray_prefix }}/{{ v2ray_version }}.zip"

v2ray_inbounds: []
v2ray_outbounds: []
v2ray_rules: []
v2ray_ssl_enabled: false
v2ray_outbounds_default:
  - protocol: freedom
    tag: direct
  - protocol: blackhole
    tag: blocked
  - protocol: socks
    tag: tor
    settings:
      servers:
        - address: localhost
          port: 9050

v2ray_rules_default:
  - ip:
      - geoip:private
    outboundTag: blocked
  - domain:
      - domain:onion
    outboundTag: tor

v2ray_ads_domains:
  - vungle.com
  - unityads.unity3d.com
  - supersonicads.com
  - applovin.com
  - applvn.com
  - aarki.net
  - googleads.g.doubleclick.net
  - tpc.googlesyndication.com
  - ironsrc.mob

v2ray_telegram_ips:
  # https://core.telegram.org/resources/cidr.txt
  - 2a0a:f280::/32
  - 91.105.192.0/23
  - 91.108.4.0/22
  - 91.108.8.0/22
  - 91.108.12.0/22
  - 91.108.16.0/22
  - 91.108.20.0/22
  - 91.108.56.0/22
  - 149.154.160.0/20
  - 185.76.151.0/24
  - 2001:67c:4e8::/48
  - 2001:b28:f23c::/48
  - 2001:b28:f23d::/48
  - 2001:b28:f23f::/48

v2ray_routing_strategy: ""

v2ray_dns_servers: []
v2ray_policy: {}
v2ray_extra_config: {}
