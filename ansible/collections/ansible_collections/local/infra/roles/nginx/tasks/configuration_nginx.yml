---
- name: Copy Nginx Configuration
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ (nginx_root, dest) | path_join }}"
    mode: "0644"
    lstrip_blocks: true
  vars:
    dest: "{{ item | regex_replace('.*templates/nginx/(.+)\\.j2$', '\\1') }}"
  notify: Reload nginx
  with_fileglob:
    - "templates/nginx/*.j2"
    - "templates/nginx/conf.d/*.j2"
    - "templates/nginx/snippets/*.j2"

- name: Check if certificate exists on remote host
  ansible.builtin.stat:
    path: "{{ (ssl_root, item) | path_join }}/full.pem"
  loop: "{{ [ssl_copy | default([]), nginx_sites_enabled | local.infra.gather_ssl_hosts] | flatten | unique }}"
  register: nginx_remote_certs_stat

- name: Create nginx SSL snippet files
  ansible.builtin.template:
    src: ssl.conf.j2
    dest: "{{ (nginx_root, nginx_ssl_snippets) | path_join }}/{{ item.item }}.conf"
    mode: "0644"
  loop: "{{ nginx_remote_certs_stat.results }}"
  notify: Reload nginx

- name: Create htpasswd files
  ansible.builtin.template:
    src: htpasswd.j2
    dest: /etc/nginx/htpasswd_{{ item.key }}
    mode: "0640"
    owner: root
    group: "{{ nginx_user }}"
  loop: "{{ nginx_htpasswd | dict2items }}"
  when: nginx_htpasswd is defined

- name: Copy Nginx sites available files templates
  ansible.builtin.template:
    src: "sites-available/{{ site.template | default('generic') }}.j2"
    dest: "{{ (nginx_root, nginx_sites_available_dir, item.key) | path_join }}"
    mode: "0644"
    lstrip_blocks: true
  vars:
    site_name: "{{ item.key }}"
    site: "{{ item.value }}"
  with_dict: "{{ nginx_sites_enabled }}"
  notify: Reload nginx

- name: Enable Nginx sites
  ansible.builtin.file:
    src: "{{ (nginx_root, nginx_sites_available_dir, item.key) | path_join }}"
    dest: "{{ (nginx_root, nginx_sites_enabled_dir, item.key) | path_join }}"
    state: link
  with_dict: "{{ nginx_sites_enabled }}"
  when: item.value.enabled | default(True)
  notify: Reload nginx

- name: Disable Nginx sites
  ansible.builtin.file:
    path: "{{ (nginx_root, nginx_sites_enabled_dir, item) | path_join }}"
    state: absent
  loop: "{{ nginx_sites_disabled | default([], true) }}"
  notify: Reload nginx
