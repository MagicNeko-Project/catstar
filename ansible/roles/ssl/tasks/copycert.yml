---
- name: Check if certificate folder exists
  delegate_to: localhost
  ansible.builtin.stat:
    path: "{{ ssl_cert_src | expanduser }}/{{ name }}"
  register: ssl_cert_folder
  become: false

- name: Copy certificates from cert folder
  ansible.builtin.copy:
    src: "{{ ssl_cert_src | expanduser }}/{{ item.src }}"
    dest: "{{ ssl_root }}/{{ name }}/{{ item.dest }}"
    mode: "{{ item.mode }}"
  loop:
    - src: "{{ name }}/fullchain.cer"
      dest: full.pem
      mode: "0644"
    - src: "{{ name }}/{{ name }}.key"
      dest: "key.pem"
      mode: "0600"
  when: ssl_cert_folder.stat.exists

- name: Copy fallback certificates if real certs do not exist
  ansible.builtin.copy:
    src: "{{ ssl_root }}/_/{{ item.dest }}"
    dest: "{{ ssl_root }}/{{ name }}/{{ item.dest }}"
    mode: "{{ item.mode }}"
    remote_src: true
  loop:
    - dest: full.pem
      mode: "0644"
    - dest: "key.pem"
      mode: "0600"
  when: not ssl_cert_folder.stat.exists
