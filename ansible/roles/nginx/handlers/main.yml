---
- name: Start nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Reload nginx
  ansible.builtin.service:
    name: nginx
    state: reloaded

- name: Restart php-fpm
  ansible.builtin.service:
    name: "php{{ php_version }}-fpm"
    state: restarted

- name: Start php-fpm
  ansible.builtin.service:
    name: "php{{ php_version }}-fpm"
    state: started
    enabled: true
