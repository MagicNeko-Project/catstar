---
name: Ansible CI

on:
  push:
    paths:
      - "ansible/**"
      - ".github/workflows/ansible.yml"
  pull_request:
    paths:
      - "ansible/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint pytest pytest-xdist

      - name: Install Ansible Collections
        working-directory: ansible
        run: |
          if [ -f "collections/requirements.yml" ]; then
            ansible-galaxy collection install -r collections/requirements.yml
          fi

      - name: Run Ansible Lint
        working-directory: ansible
        run: ansible-lint play.yml collections/ansible_collections/local/

      - name: Run Unit Tests
        working-directory: ansible/collections/ansible_collections/local/infra
        run: ansible-test units --local --python 3.12
